<!doctype html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <!-- Font -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link href="https://fonts.googleapis.com/css2?family=Sora:wght@100..800&display=swap" rel="stylesheet" />

        <!-- Favicon -->
        <link rel="apple-touch-icon" sizes="57x57" href="./assets/favicon/apple-icon-57x57.png" />
        <link rel="apple-touch-icon" sizes="60x60" href="./assets/favicon/apple-icon-60x60.png" />
        <link rel="apple-touch-icon" sizes="72x72" href="./assets/favicon/apple-icon-72x72.png" />
        <link rel="apple-touch-icon" sizes="76x76" href="./assets/favicon/apple-icon-76x76.png" />
        <link rel="apple-touch-icon" sizes="114x114" href="./assets/favicon/apple-icon-114x114.png" />
        <link rel="apple-touch-icon" sizes="120x120" href="./assets/favicon/apple-icon-120x120.png" />
        <link rel="apple-touch-icon" sizes="144x144" href="./assets/favicon/apple-icon-144x144.png" />
        <link rel="apple-touch-icon" sizes="152x152" href="./assets/favicon/apple-icon-152x152.png" />
        <link rel="apple-touch-icon" sizes="180x180" href="./assets/favicon/apple-icon-180x180.png" />
        <link rel="icon" type="image/png" sizes="192x192" href="./assets/favicon/android-icon-192x192.png" />
        <link rel="icon" type="image/png" sizes="32x32" href="./assets/favicon/favicon-32x32.png" />
        <link rel="icon" type="image/png" sizes="96x96" href="./assets/favicon/favicon-96x96.png" />
        <link rel="icon" type="image/png" sizes="16x16" href="./assets/favicon/favicon-16x16.png" />
        <link rel="manifest" href="./assets/favicon/manifest.json" />
        <meta name="msapplication-TileColor" content="#ffffff" />
        <meta name="msapplication-TileImage" content="./assets/favicon/ms-icon-144x144.png" />
        <meta name="theme-color" content="#ffffff" />

        <!-- Styles -->
        <link rel="stylesheet" href="./assets/css/reset.css" />
        <link rel="stylesheet" href="./assets/css/styles.css" />
        <title>shine smile</title>
    </head>
    <body>
        <main style="height: 5000px">
            <header class="header">
                <div class="container">
                    <div class="header-top">
                        <a href="/">
                            <div class="logo">
                                <div class="logo__shape"></div>
                                <span class="logo__text">
                                    <span class="logo__brand">shine</span>
                                    <span class="logo__brand logo__brand--small">smile</span>
                                </span>
                            </div>
                        </a>
                        <nav class="nav-bar">
                            <ul class="nav-bar__list">
                                <li><a class="nav-bar__item" href="#">Home</a></li>
                                <li><a class="nav-bar__item" href="#">Services</a></li>
                                <li><a class="nav-bar__item nav-bar__item--active" href="#">About</a></li>
                                <li><a class="nav-bar__item" href="#">Doctors</a></li>
                            </ul>
                        </nav>
                        <div class="action">
                            <button class="btn action__login">Log In</button>
                            <button class="btn action__signup">Sign Up</button>
                        </div>
                    </div>
                    <div class="hero">
                        <section class="hero-content">
                            <h1 class="hero__heading heading__lv1">Exceptional dental care for all ages.</h1>
                            <p class="hero__desc">
                                Exceptional dental care for all ages. Your great smile begins with a great dentist.
                            </p>
                            <div class="hero__action">
                                <button class="btn btn-book">Book Online</button>
                                <button class="btn btn-call">or call (123) 456-7890</button>
                            </div>
                        </section>
                        <div class="hero-media">
                            <figure class="hero__images">
                                <img
                                    class="hero__image"
                                    src="./assets/img/hero-img6.webp"
                                    alt="Exceptional dental care for all ages"
                                />
                                <img
                                    class="hero__image"
                                    src="./assets/img/hro-img5.webp"
                                    alt="Exceptional dental care for all ages"
                                />
                            </figure>
                        </div>
                    </div>
                </div>
            </header>
        </main>
    </body>
</html>
